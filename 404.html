<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — playr.no</title>
<meta name="theme-color" content="#0b0b12" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E%F0%9F%8E%B3%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #0b0b12;
    --fg: #f4f4f8;
    --muted: #9a9ab0;
    --accent: #ff5b7a;
    --accent-2: #7c6bff;
    --accent-3: #ffd166;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    padding: 2rem;
  }
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(60% 50% at 20% 20%, rgba(255,91,122,0.22), transparent 60%),
      radial-gradient(45% 45% at 85% 30%, rgba(124,107,255,0.25), transparent 60%),
      radial-gradient(50% 50% at 60% 90%, rgba(255,209,102,0.18), transparent 60%),
      var(--bg);
  }
  .wrap { text-align: center; max-width: 480px; }
  .code {
    font-size: clamp(5rem, 18vw, 10rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    margin: 0 0 1rem;
    background: linear-gradient(120deg, var(--accent) 0%, var(--accent-2) 55%, var(--accent-3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p {
    color: var(--muted);
    font-size: 1.1rem;
    line-height: 1.6;
    margin: 0 0 2rem;
  }
  a {
    display: inline-block;
    color: var(--fg);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0.65rem 1.5rem;
    border-radius: 999px;
    font-size: 0.95rem;
    transition: border-color 0.2s, color 0.2s;
  }
  a:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="bg" aria-hidden="true"></div>
<div class="wrap">
  <div class="code">404</div>
  <p>Denne siden finnes ikke — men domenet gjør det.<br>Kanskje det er det du leter etter?</p>
  <a href="/">Gå til playr.no</a>
</div>
</body>
</html>
